<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>WishStar League</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>WishStar</h2>

    <ul>
      <li onclick="showPage('home')">🏠 首頁</li>
      <li onclick="showPage('post')">📄 文章專區</li>
      <li onclick="showPage('work')">📊 工作紀錄</li>
    </ul>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Header -->
    <header class="header">
      <div>WishStar League</div>
      <div class="user">SHMIN ▼</div>
    </header>

    <!-- 首頁 -->
    <section id="home" class="page">

      <h2>歡迎回來，SHMIN</h2>
      <p>今天也是閃耀的一天 ✨</p>

      <div class="cards">
        <div class="card">📢<br>公告<br><span id="count">0</span></div>
        <div class="card">📋<br>工作要點</div>
        <div class="card">💡<br>銷售技巧</div>
        <div class="card">📦<br>商品資訊</div>
        <div class="card">🎓<br>教育訓練</div>
      </div>

      <div class="box">
        <h3>最新文章</h3>
        <div id="postList"></div>
      </div>

    </section>

    <!-- 文章 -->
    <section id="post" class="page hidden">

      <h2>文章專區</h2>

      <input id="title" placeholder="標題">
      <input id="content" placeholder="內容">
      <button onclick="addPost()">發佈</button>

      <div id="allPosts"></div>

    </section>

    <!-- 工作 -->
    <section id="work" class="page hidden">

      <h2>工作紀錄</h2>

      <input id="workInput" placeholder="今天做了什麼">
      <button onclick="addWork()">新增</button>

      <div id="workList"></div>

    </section>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
